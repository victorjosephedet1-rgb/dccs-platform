name: Self-Heal — Deployment Integrity

# Runs every 15 minutes to verify GitHub ↔ Netlify ↔ live site are in sync.
# If a mismatch is detected it triggers a forced redeploy from latest main.

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      force_redeploy:
        description: Force redeploy even if site appears healthy
        type: boolean
        default: false

concurrency:
  group: self-heal
  cancel-in-progress: true

env:
  NODE_VERSION: '20.18.0'
  PRODUCTION_URL: 'https://dccsverify.com'

jobs:
  integrity-check:
    name: Check Pipeline Integrity
    runs-on: ubuntu-latest
    outputs:
      needs_redeploy: ${{ steps.compare.outputs.needs_redeploy }}
      latest_sha: ${{ steps.get-sha.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Get latest main SHA
        id: get-sha
        run: echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Check live site health
        id: health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "${{ env.PRODUCTION_URL }}" || echo "000")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "Live site HTTP $STATUS"

      - name: Get Netlify deployed SHA
        id: netlify-sha
        run: |
          DEPLOYED=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.NETLIFY_AUTH_TOKEN }}" \
            "https://api.netlify.com/api/v1/sites/${{ secrets.NETLIFY_SITE_ID }}/deploys?per_page=1" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0].get('commit_ref','') if d else '')" 2>/dev/null || echo "")
          echo "sha=$DEPLOYED" >> $GITHUB_OUTPUT
          echo "Netlify deployed SHA: $DEPLOYED"

      - name: Compare and decide
        id: compare
        run: |
          LATEST="${{ steps.get-sha.outputs.sha }}"
          DEPLOYED="${{ steps.netlify-sha.outputs.sha }}"
          HEALTH="${{ steps.health.outputs.status }}"
          FORCE="${{ inputs.force_redeploy }}"

          echo "Latest commit : $LATEST"
          echo "Netlify deploy: $DEPLOYED"
          echo "Site health   : $HEALTH"

          NEEDS_REDEPLOY="false"

          # Mismatch between GitHub and Netlify
          if [ -n "$DEPLOYED" ] && [ "$LATEST" != "$DEPLOYED" ]; then
            echo "MISMATCH: GitHub ($LATEST) != Netlify ($DEPLOYED)"
            NEEDS_REDEPLOY="true"
          fi

          # Site is not responding
          if [ "$HEALTH" != "200" ] && [ "$HEALTH" != "301" ]; then
            echo "DEGRADED: site returned HTTP $HEALTH"
            NEEDS_REDEPLOY="true"
          fi

          # Manual force
          if [ "$FORCE" = "true" ]; then
            echo "FORCED: manual redeploy requested"
            NEEDS_REDEPLOY="true"
          fi

          echo "needs_redeploy=$NEEDS_REDEPLOY" >> $GITHUB_OUTPUT

      - name: Write integrity summary
        if: always()
        run: |
          echo "## Self-Heal Integrity Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Latest SHA | \`${{ steps.get-sha.outputs.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Netlify SHA | \`${{ steps.netlify-sha.outputs.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Site HTTP | ${{ steps.health.outputs.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Needs Redeploy | **${{ steps.compare.outputs.needs_redeploy }}** |" >> $GITHUB_STEP_SUMMARY
          echo "| Checked | $(date -u +"%Y-%m-%d %H:%M UTC") |" >> $GITHUB_STEP_SUMMARY

  self-heal-redeploy:
    name: Self-Heal Redeploy
    needs: integrity-check
    if: needs.integrity-check.outputs.needs_redeploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build (fresh, no cache)
        run: npm run build
        env:
          NODE_ENV: production
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
          VITE_APP_VERSION: ${{ needs.integrity-check.outputs.latest_sha }}

      - name: Assert build output
        run: |
          test -d dist            || { echo "FAIL: dist/ missing"; exit 1; }
          test -f dist/index.html || { echo "FAIL: dist/index.html missing"; exit 1; }

      - name: Deploy to Netlify (self-heal)
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: ./dist
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: |
            [SELF-HEAL] Auto-redeploy — pipeline integrity restored
            Commit: ${{ needs.integrity-check.outputs.latest_sha }}
          enable-pull-request-comment: false
          enable-commit-comment: true
          fails-without-url: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 10

      - name: Verify recovery
        run: |
          echo "Waiting 45s for CDN propagation after self-heal deploy..."
          sleep 45
          MAX=5
          DELAY=20
          for i in $(seq 1 $MAX); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "${{ env.PRODUCTION_URL }}" || echo "000")
            echo "Recovery check $i/$MAX — HTTP $STATUS"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ]; then
              echo "Recovery confirmed — site is healthy"
              exit 0
            fi
            [ "$i" -lt "$MAX" ] && sleep $DELAY
          done
          echo "FAIL: site still not responding after self-heal"
          exit 1

      - name: Write self-heal summary
        if: always()
        run: |
          echo "## Self-Heal Redeploy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered | $(date -u +"%Y-%m-%d %H:%M UTC") |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ needs.integrity-check.outputs.latest_sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Site | [${{ env.PRODUCTION_URL }}](${{ env.PRODUCTION_URL }}) |" >> $GITHUB_STEP_SUMMARY
