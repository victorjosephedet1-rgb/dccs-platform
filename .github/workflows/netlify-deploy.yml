name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: Manual deploy reason
        required: false
        default: Manual trigger

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  NODE_VERSION: '20.18.0'
  PRODUCTION_URL: 'https://dccsverify.com'

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute cache key
        id: cache-key
        run: echo "value=node-modules-${{ hashFiles('package-lock.json') }}" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Restore node_modules cache
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ steps.cache-key.outputs.value }}

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

  build:
    name: Build
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ needs.install.outputs.cache-key }}

      - name: Build production bundle
        run: npm run build
        env:
          NODE_ENV: production
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
          VITE_APP_VERSION: ${{ github.sha }}

      - name: Assert build output
        run: |
          test -d dist            || { echo "FAIL: dist/ missing"; exit 1; }
          test -f dist/index.html || { echo "FAIL: dist/index.html missing"; exit 1; }
          echo "Build size: $(du -sh dist | cut -f1)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 14
          if-no-files-found: error

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ env.PRODUCTION_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: ./dist
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: |
            ${{ github.event.head_commit.message || inputs.reason }}
            Commit: ${{ github.sha }}
          enable-pull-request-comment: false
          enable-commit-comment: true
          fails-without-url: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 10

  validate:
    name: Post-Deploy Check
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CDN propagation
        run: sleep 30

      - name: Health check (with retry)
        run: |
          MAX=5
          DELAY=15
          for i in $(seq 1 $MAX); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "${{ env.PRODUCTION_URL }}" || echo "000")
            echo "Attempt $i/$MAX — HTTP $STATUS — ${{ env.PRODUCTION_URL }}"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ]; then
              echo "Health check passed"
              exit 0
            fi
            [ "$i" -lt "$MAX" ] && sleep $DELAY
          done
          echo "FAIL: site returned $STATUS after $MAX attempts"
          exit 1

      - name: Ping Google Search Console
        run: |
          echo "Notifying Google of updated content..."
          # Ping Google sitemap to trigger re-crawl
          curl -s "https://www.google.com/ping?sitemap=https://dccsverify.com/sitemap.xml" || true
          echo "Sitemap pinged for re-indexing"

      - name: Write job summary
        if: always()
        run: |
          echo "## Deploy: ${{ needs.deploy.result == 'success' && 'SUCCESS' || 'FAILED' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Site | [${{ env.PRODUCTION_URL }}](${{ env.PRODUCTION_URL }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Author | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployed | $(date -u +"%Y-%m-%d %H:%M UTC") |" >> $GITHUB_STEP_SUMMARY
          echo "| Google Notified | Yes (sitemap pinged) |" >> $GITHUB_STEP_SUMMARY
