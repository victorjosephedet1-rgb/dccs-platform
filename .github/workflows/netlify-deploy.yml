name: Deploy to Netlify

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy DCCS Platform to Netlify

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: './dist'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions - ${{ github.event.head_commit.message }}"
          enable-pull-request-comment: true
          enable-commit-comment: true
          overwrites-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Health check deployment
        if: success()
        run: |
          echo "Waiting for deployment to be live..."
          sleep 10
          
          echo "Running health checks..."
          HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://dccsverify.com || echo "000")
          
          if [ "$HEALTH_STATUS" = "200" ]; then
            echo "✅ Site is live and responding"
          else
            echo "⚠️ Site returned status: $HEALTH_STATUS"
          fi

      - name: Notify deployment webhook
        if: success()
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          curl -X POST "${{ secrets.VITE_SUPABASE_URL }}/functions/v1/github-deployment-webhook" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -d '{
              "event": "deployment",
              "status": "success",
              "commit": "${{ github.sha }}",
              "branch": "${{ github.ref_name }}",
              "message": "${{ github.event.head_commit.message }}",
              "author": "${{ github.actor }}",
              "url": "https://dccsverify.com",
              "timestamp": "'"$TIMESTAMP"'",
              "workflow_run_id": "${{ github.run_id }}",
              "repository": "${{ github.repository }}"
            }' || echo "⚠️ Webhook notification failed (non-critical)"

      - name: Create deployment summary
        if: success()
        run: |
          echo "## 🚀 Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Your changes are now LIVE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Live Site**: [dccsverify.com](https://dccsverify.com)" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform**: Digital Creative Copyright System (DCCS)" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Author**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Message**: ${{ github.event.head_commit.message }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Quick Links" >> $GITHUB_STEP_SUMMARY
          echo "- 🌐 [View Live Site](https://dccsverify.com)" >> $GITHUB_STEP_SUMMARY
          echo "- 📄 [Version Info](https://dccsverify.com/version.json)" >> $GITHUB_STEP_SUMMARY
          echo "- 🗺️ [Sitemap](https://dccsverify.com/sitemap.xml)" >> $GITHUB_STEP_SUMMARY
          echo "- 📊 [Deployment Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Automation Status" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Code pushed to GitHub" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Build completed successfully" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Deployed to Netlify" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Bolt Database notified" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ All systems synchronized" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**⚡ Total deployment time: ~3 minutes**" >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure()
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "## ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Error Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Author**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Failed At**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Troubleshooting Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Check the logs above for specific error messages" >> $GITHUB_STEP_SUMMARY
          echo "2. Verify all GitHub secrets are correctly configured" >> $GITHUB_STEP_SUMMARY
          echo "3. Run \`npm run build\` locally to test the build" >> $GITHUB_STEP_SUMMARY
