[profile.default]
src = "contracts"
out = "out"
libs = ["node_modules", "lib"]
test = "test/foundry"
cache_path = "cache_foundry"

# Solidity compiler settings
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true

# Testing settings
fuzz_runs = 1000
fuzz_max_test_rejects = 100000

# Invariant testing settings
invariant_runs = 256
invariant_depth = 15
invariant_fail_on_revert = false

# Gas reporting
gas_reports = ["*"]

# Code coverage
[profile.ci]
fuzz_runs = 10000
invariant_runs = 512

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"

[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
base = "${BASE_RPC_URL}"
polygon = "${POLYGON_RPC_URL}"

[etherscan]
base_sepolia = { key = "${BASESCAN_API_KEY}" }
base = { key = "${BASESCAN_API_KEY}" }
polygon = { key = "${POLYGONSCAN_API_KEY}" }
