# Digital Creative Copyright System (DCCS)
# Operated by Victor360 Brand Limited
# Primary domain: dccsverify.com

# ──────────────────────────────────────────────────────────────
# Domain redirects
# ──────────────────────────────────────────────────────────────

[[redirects]]
from   = "https://v3bmusic.ai/*"
to     = "https://dccsverify.com/:splat"
status = 301
force  = true

[[redirects]]
from   = "https://www.v3bmusic.ai/*"
to     = "https://dccsverify.com/:splat"
status = 301
force  = true

[[redirects]]
from   = "https://www.dccsverify.com/*"
to     = "https://dccsverify.com/:splat"
status = 301
force  = true

# Legacy route aliases — permanent redirects to canonical paths
[[redirects]]
from   = "/platform-story"
to     = "/story"
status = 301
force  = true

[[redirects]]
from   = "/verify-code"
to     = "/verify"
status = 301
force  = true

# SPA catch-all — must be last redirect
[[redirects]]
from   = "/*"
to     = "/index.html"
status = 200

# ──────────────────────────────────────────────────────────────
# Build configuration
# ──────────────────────────────────────────────────────────────

[build]
command = "npm ci && npm run build"
publish = "dist"

[build.environment]
NODE_VERSION    = "20.18.0"
NPM_FLAGS       = "--prefer-offline"
SITE_NAME       = "Digital Creative Copyright System (DCCS)"
COMPANY_NAME    = "Victor360 Brand Limited"

# ──────────────────────────────────────────────────────────────
# Cache headers — immutable assets (hashed filenames from Vite)
# ──────────────────────────────────────────────────────────────

[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/sw.js"
[headers.values]
Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
for = "/manifest.webmanifest"
[headers.values]
Cache-Control = "public, max-age=86400"

[[headers]]
for = "/*.json"
[headers.values]
Cache-Control = "public, max-age=3600"

[[headers]]
for = "/*.xml"
[headers.values]
Cache-Control = "public, max-age=3600"

[[headers]]
for = "/*.ico"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
Content-Type  = "image/x-icon"

[[headers]]
for = "/*.png"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
Content-Type  = "image/png"

# ──────────────────────────────────────────────────────────────
# Security headers — applied to every response
# ──────────────────────────────────────────────────────────────

[[headers]]
for = "/*"
[headers.values]
# Prevent framing (clickjacking)
X-Frame-Options = "DENY"

# Enforce MIME types
X-Content-Type-Options = "nosniff"

# Legacy XSS filter
X-XSS-Protection = "1; mode=block"

# Referrer control
Referrer-Policy = "strict-origin-when-cross-origin"

# Permissions policy — deny dangerous capabilities
Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=(), serial=(), nfc=()"

# HSTS — 1 year, include subdomains
Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Content Security Policy
# script-src:  own bundles + Stripe.js (required for payment iframe)
# connect-src: Supabase REST + WebSocket + Stripe API
# frame-src:   Stripe payment iframe only
Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.stripe.com; img-src 'self' data: blob: https:; font-src 'self' data:; frame-src https://js.stripe.com; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;"

# Cross-origin isolation for Wasm/SharedArrayBuffer (future-proof)
Cross-Origin-Opener-Policy   = "same-origin-allow-popups"
Cross-Origin-Resource-Policy = "same-site"

# ──────────────────────────────────────────────────────────────
# Environment: production
# VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY, VITE_STRIPE_PUBLISHABLE_KEY
# must be set in the Netlify dashboard under Site Settings → Environment Variables.
# Do NOT commit secret values here.
# ──────────────────────────────────────────────────────────────

[context.production]
environment = { SITE_NAME = "DCCS - Digital Creative Copyright System", COMPANY = "Victor360 Brand Limited", VITE_DEPLOY_ENV = "production" }

# ──────────────────────────────────────────────────────────────
# Environment: deploy previews (pull requests)
# ──────────────────────────────────────────────────────────────

[context.deploy-preview]
environment = { SITE_NAME = "DCCS Preview", COMPANY = "Victor360 Brand Limited", VITE_DEPLOY_ENV = "preview" }

# ──────────────────────────────────────────────────────────────
# Environment: branch deploys (feature branches)
# ──────────────────────────────────────────────────────────────

[context.branch-deploy]
environment = { SITE_NAME = "DCCS Branch Deploy", COMPANY = "Victor360 Brand Limited", VITE_DEPLOY_ENV = "branch" }
